<form [formGroup]="studentForm" (ngSubmit)="formsubmit()" class="student-form">
    <label>
      Id:
      <input type="number" formControlName="id">
    </label>
    <label>
      Name:
      <input type="text" formControlName="name">
      @if(studentForm.controls['name']?.errors?.['noSpace'] && studentForm.controls['name']?.touched) {
        <div>Name should not contain spaces.</div>
      }
      @if(studentForm.controls['name']?.errors?.['pattern']) {
                <div>Name should contain only alphabets.</div>
            }
    </label>
    <label>
      Branch:
      <input type="text" formControlName="branch">
    </label>
    <label>
      Marks:
      <input type="number" formControlName="marks">
    </label>
    <button type="submit">Submit</button>
  </form>
