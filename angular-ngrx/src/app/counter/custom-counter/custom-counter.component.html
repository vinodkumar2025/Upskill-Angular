<div class="row">
    <div class="col-6">
      <input type="number" [(ngModel)]="addcounter">
      <button class="btn btn-primary" (click)="onAddClick()">Add Counter</button>
    </div>
    <div class="col-6">
      <input type="number" [(ngModel)]="removecounter">
      <button class="btn btn-danger" (click)="onRemoveClick()">Remove Counter</button>
    </div>
</div>
