<div class="container mt-4">

  <table class="table table-bordered table-striped table-hover">
    <thead class="table-dark">
      <tr>
        <th>ID</th>
        <th>Title</th>
        <th style="width: 120px;">Update</th>
        <th style="width: 120px;">Delete</th>
      </tr>
    </thead>

    <tbody>
      <tr *ngFor="let todo of todos$ | async">
        <td>{{ todo.id }}</td>
        <td>{{ todo.title }}</td>

        <td>
          <button class="btn btn-sm btn-warning" (click)="onUpdateClick(todo.id)">
            Update
          </button>
        </td>

        <td>
          <button class="btn btn-sm btn-danger" (click)="onDeleteClick(todo.id)">
            Delete
          </button>
        </td>
      </tr>

      <!-- Empty state -->
      <tr *ngIf="(todos$ | async)?.length === 0">
        <td colspan="4" class="text-center text-muted">
          No todos found
        </td>
      </tr>
    </tbody>
  </table>

</div>
